<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Rotina - Sem conexao</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Avenir Next", "Trebuchet MS", "Segoe UI", sans-serif;
        background: #eef4f1;
        color: #18252a;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top right, rgba(79, 174, 170, 0.16), transparent 30%),
          radial-gradient(circle at bottom left, rgba(236, 131, 78, 0.14), transparent 24%),
          #eef4f1;
      }

      article {
        width: min(100%, 480px);
        border-radius: 28px;
        padding: 24px;
        background: rgba(251, 253, 252, 0.92);
        border: 1px solid rgba(103, 122, 129, 0.16);
        box-shadow: 0 14px 40px rgba(29, 49, 54, 0.08);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 1.8rem;
      }

      p {
        margin: 0;
        color: #5d7076;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <article>
      <h1>Sem conexao</h1>
      <p>Depois da primeira visita, isso aqui continua abrindo sem internet. Quando a conexao voltar, recarregue para atualizar os arquivos.</p>
    </article>
  </body>
  </html>
